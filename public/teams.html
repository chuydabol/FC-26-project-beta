<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bota FC Fixtures</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #05070d;
      --panel: rgba(14, 20, 33, 0.88);
      --panel-strong: rgba(20, 30, 49, 0.96);
      --text: #f7fbff;
      --muted: #96a3b8;
      --accent: #34d399;
      --accent-2: #38bdf8;
      --danger: #fb7185;
      --draw: #fbbf24;
      --border: rgba(148, 163, 184, 0.22);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 20% 5%, rgba(52, 211, 153, 0.18), transparent 30rem),
        radial-gradient(circle at 80% 0%, rgba(56, 189, 248, 0.16), transparent 34rem),
        linear-gradient(145deg, #02030a 0%, var(--bg) 48%, #020617 100%);
      color: var(--text);
    }

    .shell {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 56px;
    }

    header {
      display: grid;
      gap: 18px;
      padding: 28px;
      border: 1px solid var(--border);
      border-radius: 28px;
      background: linear-gradient(145deg, rgba(15, 23, 42, 0.9), rgba(2, 6, 23, 0.78));
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.38);
    }

    .eyebrow {
      margin: 0;
      color: var(--accent);
      font-size: 0.8rem;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.35rem, 8vw, 5.25rem);
      line-height: 0.95;
      letter-spacing: -0.07em;
    }

    .lede {
      max-width: 760px;
      margin: 0;
      color: var(--muted);
      font-size: clamp(1rem, 2vw, 1.2rem);
      line-height: 1.7;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-top: 26px;
      border-bottom: 1px solid var(--border);
    }

    .tab {
      appearance: none;
      border: 1px solid var(--border);
      border-bottom: 0;
      border-radius: 16px 16px 0 0;
      padding: 12px 18px;
      background: var(--panel-strong);
      color: var(--text);
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    main {
      margin-top: 22px;
      display: grid;
      gap: 16px;
    }

    .toolbar,
    .match-card,
    .empty,
    .error {
      border: 1px solid var(--border);
      border-radius: 22px;
      background: var(--panel);
      backdrop-filter: blur(16px);
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 14px;
      padding: 16px;
    }

    .status {
      color: var(--muted);
      font-size: 0.95rem;
    }

    button.refresh {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #02111b;
      cursor: pointer;
      font-weight: 900;
    }

    button.refresh:disabled {
      cursor: wait;
      opacity: 0.7;
    }

    .match-card {
      display: grid;
      grid-template-columns: 92px 1fr auto;
      align-items: center;
      gap: 18px;
      padding: 18px;
    }

    .result {
      display: grid;
      place-items: center;
      width: 56px;
      height: 56px;
      border-radius: 18px;
      background: rgba(148, 163, 184, 0.12);
      color: var(--muted);
      font-size: 1.4rem;
      font-weight: 950;
    }

    .result.W { background: rgba(52, 211, 153, 0.16); color: var(--accent); }
    .result.L { background: rgba(251, 113, 133, 0.16); color: var(--danger); }
    .result.D { background: rgba(251, 191, 36, 0.16); color: var(--draw); }

    .date {
      color: var(--muted);
      font-size: 0.85rem;
      line-height: 1.5;
    }

    .teams {
      display: grid;
      gap: 8px;
    }

    .team-line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      font-size: clamp(1.05rem, 3vw, 1.35rem);
      font-weight: 850;
    }

    .team-line span:first-child {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .score {
      min-width: 2ch;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .match-id {
      color: var(--muted);
      font-size: 0.82rem;
      text-align: right;
    }

    .empty,
    .error {
      padding: 28px;
      color: var(--muted);
      line-height: 1.7;
    }

    .error { color: #fecdd3; border-color: rgba(251, 113, 133, 0.34); }

    @media (max-width: 720px) {
      .shell { width: min(100% - 20px, 1120px); padding-top: 16px; }
      header { padding: 22px; }
      .match-card { grid-template-columns: 64px 1fr; }
      .match-id { grid-column: 1 / -1; text-align: left; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <p class="eyebrow">EAFC Friendly Match Viewer</p>
      <h1>Bota FC</h1>
      <p class="lede">A clean restart of the old project. For now this page only reads Bota FC friendly matches from EA and displays them in the fixtures tab.</p>
    </header>

    <nav class="tabs" aria-label="Primary">
      <button class="tab" type="button">Fixtures</button>
    </nav>

    <main>
      <section class="toolbar" aria-live="polite">
        <div>
          <strong id="teamLabel">Bota FC</strong>
          <div class="status" id="status">Loading friendly matches…</div>
        </div>
        <button class="refresh" id="refresh" type="button">Refresh</button>
      </section>

      <section id="matches" aria-label="Bota FC fixtures"></section>
    </main>
  </div>

  <script>
    const matchesEl = document.getElementById('matches');
    const statusEl = document.getElementById('status');
    const teamLabelEl = document.getElementById('teamLabel');
    const refreshButton = document.getElementById('refresh');

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>'"]/g, char => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        "'": '&#39;',
        '"': '&quot;'
      }[char]));
    }

    function formatDate(timestamp) {
      if (!timestamp) return 'Date unavailable';
      return new Intl.DateTimeFormat(undefined, {
        dateStyle: 'medium',
        timeStyle: 'short'
      }).format(new Date(timestamp));
    }

    function scoreValue(value) {
      return value === null || value === undefined ? '–' : Number(value);
    }

    function renderMatch(match) {
      const team = match.team || {};
      const opponent = match.opponent || { name: 'Opponent TBD', goals: null };
      const result = match.result || '—';
      return `
        <article class="match-card">
          <div>
            <div class="result ${escapeHtml(result)}">${escapeHtml(result)}</div>
            <div class="date">${escapeHtml(formatDate(match.timestamp))}</div>
          </div>
          <div class="teams">
            <div class="team-line"><span>${escapeHtml(team.name || 'Bota FC')}</span><span class="score">${scoreValue(match.score?.for)}</span></div>
            <div class="team-line"><span>${escapeHtml(opponent.name)}</span><span class="score">${scoreValue(match.score?.against)}</span></div>
          </div>
          <div class="match-id">Match ID<br>${escapeHtml(match.id)}</div>
        </article>
      `;
    }

    function renderEmpty() {
      matchesEl.innerHTML = '<div class="empty">No friendly matches were returned by EA yet. Try refreshing again later.</div>';
    }

    async function loadMatches() {
      refreshButton.disabled = true;
      statusEl.textContent = 'Loading friendly matches…';
      try {
        const response = await fetch('/api/matches');
        const payload = await response.json();
        if (!response.ok) throw new Error(payload.details || payload.error || 'Request failed');
        teamLabelEl.textContent = payload.team?.name || 'Bota FC';
        const matches = Array.isArray(payload.matches) ? payload.matches : [];
        statusEl.textContent = `${matches.length} friendly ${matches.length === 1 ? 'match' : 'matches'} loaded from EA.`;
        if (!matches.length) return renderEmpty();
        matchesEl.innerHTML = matches.map(renderMatch).join('');
      } catch (error) {
        statusEl.textContent = 'Unable to load matches.';
        matchesEl.innerHTML = `<div class="error">EA friendly matches could not be loaded: ${escapeHtml(error.message)}</div>`;
      } finally {
        refreshButton.disabled = false;
      }
    }

    refreshButton.addEventListener('click', loadMatches);
    loadMatches();
  </script>
</body>
</html>
